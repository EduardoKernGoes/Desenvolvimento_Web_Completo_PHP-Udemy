<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Filmes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src = xmltojson.js></script>

    <script>

        function getFilmes(){
            let xmlHttp = new XMLHttpRequest();
            xmlHttp.open('GET', 'http://localhost/Aulas/Se%C3%A7%C3%A3o_24/ajax/filmes.xml')

            xmlHttp.onreadystatechange = () =>{
                if(xmlHttp.readyState == 4 && xmlHttp.status == 200){
                    let XMLFilmes = xmlHttp.responseText
                    
                    let parser = new DOMParser()

                    domFilmes = parser.parseFromString(XMLFilmes, 'text/xml')

                    jsonFilmes = xmlToJson(domFilmes)

                    console.log(jsonFilmes)

                    for(let i in jsonFilmes['filmes']['filme']){
                        let item = jsonFilmes['filmes']['filme'][i]

                        let divRow = document.createElement('div')
                        divRow.className = 'row'

                        let divCol = document.createElement('div')
                        divCol.className = 'col'

                        let h2 = document.createElement('h2')
                        h2.innerHTML = '<strong>Título:</strong> ' + item['titulo']['#text']

                        let p1 = document.createElement('p')
                        p1.innerHTML = '<strong>Resumo:</strong> ' + item['resumo']['#text']

                        let genero = ''

                        for(let g in item.genero){
                            if(genero) genero += ', '

                            genero += item.genero[g]['#text']
                        }

                        let p2 = document.createElement('p')
                        p2.innerHTML = '<strong>Gênero:</strong> ' + genero

                        let elenco = ''
                        for(let e in item.elenco.ator){
                            if(elenco) elenco += ', '

                            elenco += item.elenco.ator[e]['#text']
                        }

                        let p3 = document.createElement('p')
                        p3.innerHTML = '<strong>Elenco:</strong> ' + elenco

                        let p4 = document.createElement('p')
                        p4.innerHTML = '<strong>Data de lançamento: </strong>' + item.dataLancamento['#text'] + ' (' + item.dataLancamento['@attributes']['pais'] + ')'

                        let hr = document.createElement('hr')

                        divRow.appendChild(divCol)
                        divCol.appendChild(h2)
                        divCol.appendChild(p1)
                        divCol.appendChild(p2)
                        divCol.appendChild(p3)
                        divCol.appendChild(p4)
                        divCol.appendChild(hr)

                        document.getElementById('lista').appendChild(divRow)

                    }

                }
                if(xmlHttp.readyState == 4 && xmlHttp.status == 404){
                    //
                }
            }

            xmlHttp.send()
        }

    </script>
</head>
<body>
    
    <nav class="navbar navbar-light bg-light mb-4">
        <div class="container">
            <div class="navbar-brand mb-0 h1">
                <h3>Catálogo de filmes</h3>
            </div>
        </div>
    </nav>
    
    <div id="lista" class="container">
        <div class="row mb-5">
            <div class="col">
                <button type="button" onclick="getFilmes()" class="btn btn-dark"> Listar Filmes</button>
            </div>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
